name: Flusso AUTOMATICO Spese-Entrate

on:
  workflow_dispatch:
    inputs:
      flag_scrittura_sul_drive:
        description: "Se disattivato non scrive sullo Sheet"
        required: false
        default: true
        type: boolean
      flag_sovrascrivi_sheet:
        description: "Se disattivato il flusso si blocca se lo sheet non è vuoto"
        required: false
        default: true
        type: boolean
      flag_sovrascrivi_raw_dbx:
        description: "Se disattivato il flusso si blocca all'incontro di un duplicato 'raw'"
        required: false
        default: true
        type: boolean
      flag_sovrascrivi_prc_dbx:
        description: "Se disattivato il flusso si blocca all'incontro di un duplicato 'processed'"
        required: false
        default: true
        type: boolean
      log_duplicati:
        description: "Stampa i record duplici"
        required: false
        default: false
        type: boolean
      log_altro:
        description: "Stampa i record che hanno Categoria = 'Altro'"
        required: false
        default: false
        type: boolean

jobs:
  flusso:
    runs-on: ubuntu-latest

    env:
      FLAG_AUTOMATIC: true
      FLAG_SCRITTURA_SUL_DRIVE: ${{ inputs.flag_scrittura_sul_drive }}
      FLAG_SOVRASCRIVI_SHEET:   ${{ inputs.flag_sovrascrivi_sheet }}
      FLAG_SOVRASCRIVI_RAW_DBX: ${{ inputs.flag_sovrascrivi_raw_dbx }}
      FLAG_SOVRASCRIVI_PRC_DBX: ${{ inputs.flag_sovrascrivi_prc_dbx }}
      FLAG_LOG_DUPLICATI:       ${{ inputs.log_duplicati }}
      FLAG_LOG_ALTRO:           ${{ inputs.log_altro }}
      DROPBOX_APP_KEY:          ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET:       ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN:    ${{ secrets.DROPBOX_REFRESH_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui flusso
        run: python main_job_auto.py