name: Flusso Spese

on:
  workflow_dispatch:

jobs:
  flusso:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Scarica da Dropbox
        run: python DROPBOX/download_launch_gh.py

      - name: Commit file scaricato
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Dati/TabelleApp/
          git commit -m "Download file da Dropbox" || echo "No changes"
          git push

      - name: Scrivi su Google Sheet
        run: python GOOGLE_DRIVE/write_launch_gh.py